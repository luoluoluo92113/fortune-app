<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIз®—еҚҰ В· з»ҲжһҒзүҲ</title>
<style>
body{
  margin:0;
  height:100vh;
  background: radial-gradient(circle at top,#1a1a2e,#0f0f1a);
  color:#fff;
  font-family:sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* жҳҹз©ә */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.8;
  animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
  from{opacity:0.2}
  to{opacity:1}
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:320px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin:20px 0;
}

button{
  padding:12px 24px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6c5ce7,#a29bfe);
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:disabled{
  opacity:0.5;
}

#result{
  margin-top:20px;
  min-height:40px;
  opacity:0.9;
}

</style>
</head>
<body>

<div class="card">
  <h2>рҹ”® AIз®—еҚҰ</h2>
  <input id="q" placeholder="иҫ“е…ҘдҪ зҡ„й—®йўҳ...">
  <button onclick="calc()">ејҖе§ӢеҚ еҚң</button>
  <div id="result"></div>
</div>

<script>
// з”ҹжҲҗжҳҹз©ә
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.left=Math.random()*100+'vw';
  s.style.top=Math.random()*100+'vh';
  document.body.appendChild(s);
}

const localFortunes=[
"еӨ§еҗүпјҡж—¶жқҘиҝҗиҪ¬вңЁ",
"дёӯеҗүпјҡзЁідёӯжұӮиғңрҹҢҷ",
"е°ҸеҗүпјҡеҠӘеҠӣеҚіжңүеӣһжҠҘрҹҚҖ",
"еҮ¶пјҡд»Ҡж—Ҙе®ңйқҷдёҚе®ңеҠЁвҡ пёҸ",
"зҺ„жңәпјҡе‘Ҫз”ұеҝғз”ҹпјҢиҝҗз”ұе·ұйҖ "
];

async function calc(){
  const input=document.getElementById('q');
  const result=document.getElementById('result');
  const btn=document.querySelector('button');

  if(!input.value){
    result.innerText="иҜ·иҫ“е…Ҙй—®йўҳ";
    return;
  }

  btn.disabled=true;
  result.innerText="рҹ”® еӨ©жңәжҺЁжј”дёӯ...";

  try{
    const res=await fetch('/api/fortune',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:input.value})
    });

    const data=await res.json();
    typeText(result,data.result);

  }catch(e){
    // fallback
    const r=localFortunes[Math.floor(Math.random()*localFortunes.length)];
    typeText(result,r);
  }

  btn.disabled=false;
}

function typeText(el,text){
  el.innerText="";
  let i=0;
  const timer=setInterval(()=>{
    el.innerText+=text[i];
    i++;
    if(i>=text.length) clearInterval(timer);
  },40);
}
</script>

</body>
</html>
