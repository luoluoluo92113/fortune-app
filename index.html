<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AI算卦</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #1e1e2f, #2d2d44);
  font-family: sans-serif;
  color: white;
}

.card {
  background: #3a3a55;
  padding: 40px;
  border-radius: 20px;
  width: 400px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin: 20px 0;
}

button {
  background: #6c5ce7;
  border: none;
  padding: 12px 30px;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #5a4bd1;
}

#result {
  margin-top: 20px;
  min-height: 40px;
}
</style>
</head>

<body>

<div class="card">
  <h1>🔮 AI算卦</h1>

  <input id="q" placeholder="输入你的问题..." />

  <button onclick="calc()">开始占卜</button>

  <div id="result"></div>
</div>

<script>
async function calc() {
  const input = document.getElementById("q").value;
  const resultDiv = document.getElementById("result");

  if (!input) {
    resultDiv.innerText = "请输入问题 🙏";
    return;
  }

  resultDiv.innerText = "🔮 正在推算中...";

  try {
    const res = await fetch("/api/fortune", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ question: input })
    });

    const data = await res.json();

    resultDiv.innerText = data.result || "暂无结果";

  } catch (err) {
    resultDiv.innerText = "网络错误 😢";
  }
}
</script>

</body>
</html>
