<!DOCTYPE html><html>
<head>
  <meta charset="UTF-8">
  <title>AI算卦</title>
</head>
<body style="text-align:center;font-family:sans-serif;padding:50px;"><h1>🔮 AI算卦</h1><input id="q" placeholder="输入你的问题" style="padding:10px;width:250px;" />
<br><br>
<button onclick="go()" style="padding:10px 20px;">开始占卜</button><pre id="result" style="margin-top:30px;"></pre><script>
function toss() {
  return [0,0,0].map(()=>Math.random()>0.5?3:2).reduce((a,b)=>a+b,0);
}

async function go(){
  let lines=[],changing=[];
  for(let i=0;i<6;i++){
    let v=toss();
    lines.push(v);
    if(v==6||v==9) changing.push(i);
  }

  let base="卦"+Math.floor(Math.random()*64);
  let changed="卦"+Math.floor(Math.random()*64);

  let res = await fetch("/api/fortune",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      question:document.getElementById("q").value,
      base,changed,changingCount:changing.length
    })
  });

  let data = await res.json();
  document.getElementById("result").innerText = data.text;
}
</script></body>
</html>
